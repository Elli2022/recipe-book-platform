name: Deploy to Netlify

# Netlify deploys automatically via its own GitHub integration.
# This workflow is manual-only until NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
# are added as repository secrets (otherwise every push sends failure emails).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Elli2022/recipe-book-platform' || github.repository == 'Elli2022/receptbok'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Netlify
        run: npx netlify-cli@23.12.2 deploy --prod --build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
